<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ariana Grande Fan Page</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #ffd6ec, #fff);
      text-align: center;
      color: #333;
    }

    h1 {
      margin-top: 30px;
      font-size: 45px;
      color: #d63384;
    }

    p {
      font-size: 20px;
      margin-bottom: 30px;
    }

    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .gallery img {
      width: 300px;
      height: 400px;
      object-fit: cover;
      border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      background: #ffb3d9;
      color: white;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <h1>Ariana Grande</h1>
  <p>Moja ulubiona piosenkarka 💖</p>

  <div class="gallery">
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/8e/Ariana_Grande_2019_by_Glenn_Francis.jpg">

    <img src="https://upload.wikimedia.org/wikipedia/commons/8/84/Ariana_Grande_performing_in_2017.jpg">

    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d1/Ariana_Grande_2013.jpg">
  </div>

  <footer>
    Strona fanowska Ariany Grande ✨
  </footer>

</body>
</html>
